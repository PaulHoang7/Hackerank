x-app-build: &app-build
  context: .
  dockerfile_inline: |
    FROM python:3.12-slim

    ENV PYTHONDONTWRITEBYTECODE=1 \
        PYTHONUNBUFFERED=1 \
        PIP_NO_CACHE_DIR=1

    WORKDIR /app

    RUN apt-get update \
        && apt-get install -y --no-install-recommends ffmpeg libgl1 libglib2.0-0 \
        && rm -rf /var/lib/apt/lists/*

    COPY requirements.txt ./
    RUN pip install --upgrade pip && pip install -r requirements.txt

    COPY . .

services:
  migrate:
    image: bx-t4-video-intelligence-be:local
    command: alembic upgrade head
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: *app-build
    image: bx-t4-video-intelligence-be:local
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    image: bx-t4-video-intelligence-be:local
    command: dramatiq app.workers.actors
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bxt4
      POSTGRES_PASSWORD: bxt4
      POSTGRES_DB: bxt4
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bxt4 -d bxt4"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
